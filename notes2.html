<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E5E3DE;--text:#1A1917;--muted:#7A7671;
  --accent:#1A1917;--green:#16A34A;--amber:#D97706;--red:#DC2626;--blue:#2563EB;
  --radius:6px;--mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
  --sidebar-w:280px;
}
[data-theme="sand"]{--bg:#F8F7FF;--surface:#FFFFFF;--border:#E2E0F0;--text:#1A1830;--muted:#6B6880;--accent:#4F46E5;}
[data-theme="navy"]{--bg:#161925;--surface:#1F2437;--border:#2D3348;--text:#E8EAF0;--muted:#8890A8;--accent:#818CF8;--green:#34D399;--amber:#FCD34D;--red:#F87171;--blue:#60A5FA;}
[data-theme="dark"]{--bg:#111113;--surface:#1C1C1E;--border:#2C2C2E;--text:#F5F5F7;--muted:#8E8E93;--accent:#A78BFA;--green:#34D399;--amber:#FCD34D;--red:#F87171;--blue:#60A5FA;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--sans);font-size:15px;background:var(--bg);color:var(--text);}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
textarea,input,select{font-family:inherit;background:var(--bg);color:var(--text);color-scheme:light;border:1px solid var(--border);border-radius:var(--radius);}
[data-theme="navy"] textarea,[data-theme="navy"] input,[data-theme="navy"] select,
[data-theme="dark"] textarea,[data-theme="dark"] input,[data-theme="dark"] select{color-scheme:dark;}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.header{
  position:relative;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:12px;}
.app-title{font-size:14px;font-weight:500;letter-spacing:-.01em;}
.sync-dot{font-size:12px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:6px;}
.icon-btn{
  width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;
  justify-content:center;font-size:14px;color:var(--muted);transition:background .15s;
}
.icon-btn:hover{background:var(--border);color:var(--text);}

/* ── Main split ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--surface);overflow:hidden;
}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.search-wrap{position:relative;display:flex;align-items:center;}
.search-input{
  width:100%;padding:7px 10px 7px 30px;font-size:13px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;
}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:9px;font-size:13px;color:var(--muted);pointer-events:none;}
.new-btn{
  width:100%;padding:8px;font-size:13px;font-weight:500;border-radius:var(--radius);
  border:1px solid var(--border);color:var(--text);background:var(--surface);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;
}
.new-btn:hover{background:var(--border);}

/* Tag filter */
.tag-filter{
  padding:8px 12px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;
  min-height:0;overflow:hidden;
}
.tag-filter:empty{display:none;}
.tag-pill{
  padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500;
  border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;
}
.tag-pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

/* Note list */
.note-list{flex:1;overflow-y:auto;padding:6px 0;}
.note-item{
  padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .12s;position:relative;
}
.note-item:last-child{border-bottom:none;}
.note-item:hover{background:var(--bg);}
.note-item.active{background:var(--bg);}
.note-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent);border-radius:0 2px 2px 0;
}
.note-item-title{font-size:13px;font-weight:500;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-title.untitled{color:var(--muted);font-weight:400;font-style:italic;}
.note-item-preview{font-size:12px;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-item-meta{display:flex;align-items:center;gap:6px;margin-top:5px;}
.note-item-date{font-size:11px;color:var(--muted);}
.note-item-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.note-tag-badge{
  font-size:10px;padding:1px 6px;border-radius:8px;
  border:1px solid var(--border);color:var(--muted);
}
.note-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;}

/* ── Editor pane ── */
.editor-pane{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}
.editor-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);gap:12px;
}
.editor-empty .big-icon{font-size:40px;opacity:.4;}
.editor-empty p{font-size:14px;}

/* Editor toolbar */
.editor-toolbar{
  padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;
}
.toolbar-left{flex:1;display:flex;align-items:center;gap:8px;}
.toolbar-right{display:flex;align-items:center;gap:6px;}
.btn{
  padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;
  border:1px solid var(--border);color:var(--text);background:var(--surface);
  transition:background .15s;white-space:nowrap;
}
.btn:hover{background:var(--border);}
.btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn.primary:hover{opacity:.85;}
.btn.danger{color:var(--red);border-color:transparent;}
.btn.danger:hover{border-color:var(--red);}
.btn.sm{padding:4px 9px;font-size:11px;}

/* Template selector */
.tmpl-wrap{position:relative;}
.tmpl-btn{display:flex;align-items:center;gap:5px;}
.tmpl-btn .chevron{font-size:10px;transition:transform .15s;}
.tmpl-btn.open .chevron{transform:rotate(180deg);}
.tmpl-menu{
  position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);min-width:200px;
  z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden;
}
.tmpl-menu-item{
  padding:9px 14px;font-size:13px;cursor:pointer;display:flex;flex-direction:column;gap:2px;
}
.tmpl-menu-item:hover{background:var(--border);}
.tmpl-menu-item-name{font-weight:500;}
.tmpl-menu-item-desc{font-size:11px;color:var(--muted);}
.tmpl-divider{height:1px;background:var(--border);margin:2px 0;}

/* Raw/Preview toggle */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.view-toggle-btn{
  padding:4px 10px;font-size:12px;font-weight:500;color:var(--muted);
  background:transparent;border:none;cursor:pointer;transition:all .15s;
}
.view-toggle-btn.active{background:var(--accent);color:var(--bg);}

/* Editor body */
.editor-body{flex:1;display:flex;overflow:hidden;}
.editor-raw{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.editor-raw textarea{
  flex:1;width:100%;padding:20px 24px;font-size:14px;line-height:1.7;
  font-family:var(--mono);border:none;outline:none;resize:none;
  background:var(--surface);color:var(--text);
}
.editor-preview{
  flex:1;overflow-y:auto;padding:24px;background:var(--surface);
  font-size:14px;line-height:1.7;
}
.editor-split .editor-raw{border-right:1px solid var(--border);}

/* ── Preview styles ── */
.pr-title{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:16px;line-height:1.3;}
.pr-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;}
.pr-meta-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);min-width:90px;}
.pr-meta-val{color:var(--text);}
.pr-section{margin-top:20px;}
.pr-section-label{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);
}
.pr-item{
  display:flex;gap:10px;align-items:flex-start;padding:7px 0;
  border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;
}
.pr-item:last-child{border-bottom:none;}
.pr-item-icon{flex-shrink:0;font-size:14px;margin-top:1px;}
.pr-item-body{flex:1;}
.pr-item-badge{
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;
  border:1px solid;margin-left:6px;vertical-align:middle;
}
.pr-item-badge.action{color:var(--blue);border-color:var(--blue);}
.pr-item-badge.done{color:var(--green);border-color:var(--green);}
.pr-note-body{white-space:pre-wrap;font-size:14px;line-height:1.75;}
.pr-raw-fallback{white-space:pre-wrap;font-size:13px;line-height:1.7;color:var(--text);font-family:var(--mono);}
.pr-tag{
  display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;
  border:1px solid var(--border);color:var(--muted);margin:2px 3px 2px 0;
}
.pr-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

/* Standup styles */
.standup-block{margin-bottom:16px;}
.standup-label{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin-bottom:6px;
}
.standup-content{
  padding:10px 14px;background:var(--bg);border-radius:var(--radius);
  border-left:3px solid var(--border);font-size:13px;line-height:1.6;white-space:pre-wrap;
}
.standup-content.hier{border-left-color:var(--green);}
.standup-content.auj{border-left-color:var(--blue);}
.standup-content.bloc{border-left-color:var(--red);}

/* Reflexion styles */
.reflexion-section{margin-bottom:20px;}
.reflexion-label{
  font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.04em;
}
.reflexion-content{font-size:13px;line-height:1.65;white-space:pre-wrap;color:var(--text);}
.reflexion-options{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.reflexion-option{
  padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);
  font-size:13px;line-height:1.5;background:var(--bg);display:flex;gap:8px;align-items:flex-start;
}
.reflexion-option-num{font-weight:600;color:var(--accent);flex-shrink:0;}
.decision-box{
  margin-top:12px;padding:12px 14px;border-radius:var(--radius);
  border:2px solid var(--accent);background:var(--bg);font-size:13px;line-height:1.6;
}
.decision-box-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:4px;}

/* Export toolbar */
.export-bar{
  padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.export-bar-label{font-size:12px;color:var(--muted);flex:1;}

/* ── Drive bar ── */
.drive-bar{
  padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;font-size:12px;flex-shrink:0;
}
.drive-status{color:var(--muted);flex:1;}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--text);color:var(--bg);padding:8px 16px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Mobile ── */
@media(max-width:680px){
  .sidebar{
    position:fixed;inset:52px 0 0 0;width:100%;z-index:90;
    transform:translateX(0);transition:transform .25s;
  }
  .sidebar.hidden{transform:translateX(-100%);}
  .editor-pane{position:fixed;inset:52px 0 0 0;width:100%;}
  .editor-pane.hidden{display:none;}
  .mobile-back{display:flex !important;}
  .editor-split .editor-raw,.editor-split .editor-preview{flex:1;}
}
.mobile-back{display:none;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
.mobile-back:hover{color:var(--text);}

/* Search highlight */
.search-mark{background:#ffe066;color:#1a1a1a;border-radius:2px;padding:0 1px;}
[data-theme="dark"] .search-mark,[data-theme="navy"] .search-mark{background:#5a4a00;color:#f5d76e;}

/* ── Favorites ── */
.note-item-fav{
  background:none;border:none;cursor:pointer;font-size:13px;opacity:.3;
  transition:opacity .15s,transform .15s;padding:0;line-height:1;flex-shrink:0;
}
.note-item-fav:hover,.note-item-fav.on{opacity:1;}
.note-item-fav.on{transform:scale(1.15);}
.fav-filter{
  display:flex;align-items:center;gap:6px;padding:7px 12px;
  border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);
}
.fav-btn{
  padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  background:transparent;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.fav-btn.active{background:var(--amber);color:#fff;border-color:var(--amber);}

/* ── Tabs bar (Obsidian-style) ── */
.tabs-bar{
  display:flex;align-items:center;background:var(--bg);border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;min-height:36px;
  scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-item{
  display:flex;align-items:center;gap:6px;padding:0 12px;height:36px;
  border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;
  font-size:12px;color:var(--muted);transition:background .12s;flex-shrink:0;
  max-width:180px;
}
.tab-item:hover{background:var(--surface);color:var(--text);}
.tab-item.active{background:var(--surface);color:var(--text);font-weight:500;
  border-bottom:2px solid var(--accent);margin-bottom:-1px;}
.tab-item-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.tab-close{
  width:16px;height:16px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:11px;color:var(--muted);flex-shrink:0;opacity:0;
  background:none;border:none;cursor:pointer;transition:opacity .15s,background .15s;
}
.tab-item:hover .tab-close,.tab-item.active .tab-close{opacity:1;}
.tab-close:hover{background:var(--border);color:var(--text);}
.tabs-bar-new{
  padding:0 10px;height:36px;font-size:16px;color:var(--muted);
  cursor:pointer;background:none;border:none;flex-shrink:0;
  display:flex;align-items:center;transition:color .15s;
}
.tabs-bar-new:hover{color:var(--text);}
.tab-item.pinned .tab-pin{opacity:1;color:var(--accent);}
.tab-pin{
  width:14px;height:14px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0;
  background:none;border:none;cursor:pointer;transition:opacity .15s,color .15s;
  opacity:0;
}
.tab-item:hover .tab-pin{opacity:1;}
.tab-item.pinned{padding-left:8px;padding-right:8px;}
.tab-item.pinned .tab-item-title{max-width:60px;}
.tab-item.dragging{opacity:.4;}
.tab-item.drag-over{border-left:2px solid var(--accent);}

/* ── Note date footer ── */
.note-date-footer{
  padding:6px 24px 10px;font-size:11px;color:var(--muted);
  background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  font-family:var(--mono);
}

/* ── Rich preview ── */
.pr-link{color:var(--blue);text-decoration:none;word-break:break-all;}
.pr-link:hover{text-decoration:underline;}
.pr-yt-wrap{margin:12px 0;border-radius:var(--radius);overflow:hidden;background:#000;
  position:relative;padding-top:56.25%;max-width:560px;}
.pr-yt-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.pr-img{max-width:100%;border-radius:var(--radius);margin:8px 0;display:block;border:1px solid var(--border);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="app">

<!-- Header -->
<div class="header">
  <div class="header-left">
    <button class="mobile-back" id="mobile-back-btn" onclick="mobileBack()">← Notes</button>
    <span class="app-title">Notes</span>
    <span class="sync-dot" id="sync-dot">⚫ Local</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" title="Google Drive" onclick="handleDriveBtn()">☁</button>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Thème">☀︎</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="search" placeholder="Rechercher…" oninput="onSearch()" autocomplete="off">
      </div>
      <button class="new-btn" onclick="newNote()">＋ Nouvelle note</button>
    </div>
    <div class="fav-filter">
      <button class="fav-btn" id="fav-filter-btn" onclick="toggleFavFilter()">⭐ Favoris</button>
    </div>
    <div class="tag-filter" id="tag-filter"></div>
    <div class="note-list" id="note-list"></div>
  </div>

  <!-- Editor pane -->
  <div class="editor-pane hidden" id="editor-pane">

    <!-- Drive bar (shown when connected) -->
    <div class="drive-bar" id="drive-bar" style="display:none;">
      <span class="drive-status" id="drive-status-text">Non connecté</span>
      <button class="btn sm" onclick="pullFromDrive()">↓ Pull</button>
      <button class="btn sm" onclick="pushToDrive()">↑ Push</button>
    </div>

    <!-- Tabs bar -->
    <div class="tabs-bar" id="tabs-bar">
      <button class="tabs-bar-new" onclick="newNote()" title="Nouvelle note">＋</button>
    </div>

    <!-- No note selected -->
    <div class="editor-empty" id="editor-empty" style="display:flex;">
      <div class="big-icon">📝</div>
      <p>Sélectionne une note ou crée-en une</p>
    </div>

    <!-- Active editor -->
    <div id="editor-active" style="display:none;flex-direction:column;overflow:hidden;flex:1;">

      <div class="editor-toolbar">
        <div class="toolbar-left">
          <!-- Template dropdown -->
          <div class="tmpl-wrap" id="tmpl-wrap">
            <button class="btn tmpl-btn" id="tmpl-btn" onclick="toggleTmplMenu()">
              ✦ Appliquer <span class="chevron">▾</span>
            </button>
            <div class="tmpl-menu" id="tmpl-menu" style="display:none;"></div>
          </div>

          <!-- View toggle -->
          <div class="view-toggle" id="view-toggle">
            <button class="view-toggle-btn active" id="vt-raw" onclick="setView('raw')">Brut</button>
            <button class="view-toggle-btn" id="vt-split" onclick="setView('split')">Split</button>
            <button class="view-toggle-btn" id="vt-preview" onclick="setView('preview')">Rendu</button>
          </div>
        </div>

        <div class="toolbar-right">
          <button class="btn danger sm" onclick="deleteNote()">Supprimer</button>
        </div>
      </div>

      <div class="editor-body" id="editor-body">
        <div class="editor-raw" id="editor-raw">
          <textarea id="note-textarea" placeholder="Commence à écrire…&#10;&#10;Utilise des #tags dans ton texte.&#10;La première ligne devient le titre.&#10;Colle une image ou une URL YouTube directement." spellcheck="true" oninput="onNoteInput()" onpaste="onPaste(event)"></textarea>
        </div>
        <div class="editor-preview" id="editor-preview" style="display:none;"></div>
      </div>

      <div class="export-bar" id="export-bar" style="display:none;">
        <span class="export-bar-label">Export du rendu</span>
        <button class="btn sm" onclick="exportMd()">↓ .md</button>
        <button class="btn sm" onclick="exportTxt()">↓ .txt</button>
        <button class="btn sm primary" onclick="copyHtml()">⎘ Copier</button>
      </div>

      <div class="note-date-footer" id="note-date-footer" style="display:none;">
        <span>✎</span><span id="note-date-text"></span>
      </div>

    </div>

  </div>
</div>
</div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const APP   = 'notes2';
const SK    = 'td_v4_' + APP;
const TK    = 'td_theme_' + APP;
const TOK   = 'td_tok_' + APP;
const CLIENT_ID = '962903341875-aucgsp0h46olec36evehi500n2tgk32m.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/drive.file';
const THEMES = ['light','sand','navy','dark'];
const ICONS  = {light:'☀︎',sand:'○',navy:'◑',dark:'☾'};

// ── State ─────────────────────────────────────────────────────────────────────
let S = { notes: [] };
let curId      = null;
let searchQ    = '';
let activeTag  = null;
let favFilter  = false;
let curView    = 'raw';   // raw | split | preview
let saveTimer  = null;
let curTemplate = null;   // template applied to current note

// Tabs (Obsidian-style open tabs)
let openTabs   = [];      // [{id, pinned}]
let dragSrcIdx = null;    // drag-and-drop source index

// Drive
let driveFileId  = null;
let tokenClient  = null;
let accessToken  = sessionStorage.getItem(TOK) || null;
let pollTimer    = null;

// ── Templates ─────────────────────────────────────────────────────────────────
const TEMPLATES = [
  {
    id: 'none',
    name: 'Note libre',
    desc: 'Texte brut, aucun rendu particulier',
    placeholder: 'Titre de la note\n\nÉcris ici…',
    parse: null,
    render: renderFree
  },
  {
    id: 'cr',
    name: 'Compte Rendu',
    desc: 'Réunion → décisions, actions, prochaine étape',
    placeholder: `Titre de la réunion

date: 
participants: 
duree: 
objectif: 

## Décisions
- 

## Actions
- [ ] Texte @Assigné 2026-01-01
- [ ] 

## Prochaine réunion
date: 
ordre du jour: `,
    parse: parseCR,
    render: renderCR
  },
  {
    id: 'standup',
    name: 'Standup',
    desc: 'Hier / Aujourd\'hui / Blocages',
    placeholder: `Standup – Lundi 19 avril

hier: 
- 

aujourd'hui: 
- 

blocages: 
- `,
    parse: parseStandup,
    render: renderStandup
  },
  {
    id: 'reflexion',
    name: 'Note de réflexion',
    desc: 'Problème → options → décision',
    placeholder: `Titre de la réflexion

contexte: 

problème: 

options:
1. 
2. 
3. 

décision: 

prochaine action: `,
    parse: parseReflexion,
    render: renderReflexion
  }
];

// ── Init ──────────────────────────────────────────────────────────────────────
function ensureState() {
  if (!Array.isArray(S.notes)) S.notes = [];
  S.notes.forEach(n => { if (!n.images) n.images = {}; });
}

function init() {
  const raw = localStorage.getItem(SK);
  if (raw) { try { S = JSON.parse(raw); } catch(e){} }
  ensureState();
  const theme = localStorage.getItem(TK) || 'light';
  applyTheme(theme);
  buildTmplMenu();
  renderList();
  renderTabs();
  // If Drive token exists try auto connect
  if (accessToken) scheduleAutoRefresh();
  // Mobile: show sidebar first
  if (window.innerWidth <= 680) {
    document.getElementById('sidebar').classList.remove('hidden');
    document.getElementById('editor-pane').classList.add('hidden');
    document.getElementById('mobile-back-btn').style.display = 'none';
  } else {
    document.getElementById('editor-pane').classList.remove('hidden');
  }
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t === 'light' ? '' : t);
  document.getElementById('theme-btn').textContent = ICONS[t] || '☀︎';
  localStorage.setItem(TK, t);
}
function toggleTheme() {
  const cur = localStorage.getItem(TK) || 'light';
  applyTheme(THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length]);
}

// ── Note CRUD ─────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 10); }

function newNote(tmplId) {
  const tmpl = TEMPLATES.find(t => t.id === (tmplId || 'none')) || TEMPLATES[0];
  const n = {
    id: uid(),
    body: tmpl.placeholder || '',
    template: tmpl.id,
    favorite: false,
    created: Date.now(),
    updated: Date.now()
  };
  S.notes.unshift(n);
  autoSave();
  openNote(n.id);
  if (window.innerWidth <= 680) showEditor();
}

function openNote(id) {
  curId = id;
  const n = S.notes.find(x => x.id === id);
  if (!n) return;
  curTemplate = n.template || 'none';
  document.getElementById('note-textarea').value = n.body || '';
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-active').style.display = 'flex';
  document.getElementById('editor-active').style.flex = '1';

  // Add to tabs if not already open
  if (!openTabs.find(t => t.id === id)) {
    openTabs.push({id, pinned: false});
  }
  renderTabs();
  renderList();
  updatePreview();
  updateExportBar();
  updateDateFooter();
}

function deleteNote() {
  if (!curId) return;
  const n = S.notes.find(x => x.id === curId);
  if (!n) return;
  const title = noteTitle(n) || 'cette note';
  if (!confirm('Supprimer "' + title + '" ?')) return;
  const deletedId = curId;
  S.notes = S.notes.filter(x => x.id !== curId);
  openTabs = openTabs.filter(t => t.id !== deletedId);
  curId = null;
  curTemplate = null;
  // Open next tab if any
  const next = openTabs[openTabs.length - 1];
  if (next) {
    openNote(next.id);
  } else {
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-active').style.display = 'none';
  }
  autoSave();
  renderList();
  renderTabs();
  if (window.innerWidth <= 680) mobileBack();
  toast('Note supprimée');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  const tabsHtml = openTabs.map((t, idx) => {
    const n = S.notes.find(x => x.id === t.id);
    const title = n ? (noteTitle(n) || 'Sans titre') : 'Sans titre';
    const isActive = t.id === curId;
    const isPinned = !!t.pinned;
    const closeBtn = isPinned ? '' : '<button class="tab-close" onclick="closeTab(event,\''+t.id+'\');" title="Fermer">×</button>';
    const pinTitle = isPinned ? 'Désépingler' : 'Épingler';
    return '<div class="tab-item'+(isActive?' active':'')+(isPinned?' pinned':'')+'"'
      +' data-idx="'+idx+'"'
      +' onclick="openNote(\''+t.id+'\');"'
      +' draggable="true"'
      +' ondragstart="onTabDragStart(event,'+idx+')"'
      +' ondragover="onTabDragOver(event,'+idx+')"'
      +' ondrop="onTabDrop(event,'+idx+')"'
      +' ondragend="onTabDragEnd(event)"'
      +' ondragleave="onTabDragLeave(event)">'
      +'<button class="tab-pin" onclick="toggleTabPin(event,\''+t.id+'\');" title="'+pinTitle+'">&#128204;</button>'
      +'<span class="tab-item-title" title="'+esc(title)+'">'+esc(title)+'</span>'
      +closeBtn
      +'</div>';
  }).join('');
  bar.innerHTML = tabsHtml + `<button class="tabs-bar-new" onclick="newNote()" title="Nouvelle note">＋</button>`;
}

function toggleTabPin(e, id) {
  e.stopPropagation();
  const t = openTabs.find(x => x.id === id);
  if (!t) return;
  t.pinned = !t.pinned;
  // Pinned tabs go to front
  const pinned = openTabs.filter(x => x.pinned);
  const unpinned = openTabs.filter(x => !x.pinned);
  openTabs = [...pinned, ...unpinned];
  renderTabs();
  toast(t.pinned ? '📌 Onglet épinglé' : 'Onglet désépinglé');
}

function closeTab(e, id) {
  e.stopPropagation();
  // Cannot close pinned tab without unpinning first
  const t = openTabs.find(x => x.id === id);
  if (t && t.pinned) { toast('Désépingle d'abord l'onglet'); return; }
  openTabs = openTabs.filter(t => t.id !== id);
  if (curId === id) {
    const last = openTabs[openTabs.length - 1];
    if (last) {
      openNote(last.id);
    } else {
      curId = null;
      curTemplate = null;
      document.getElementById('editor-active').style.display = 'none';
      document.getElementById('editor-empty').style.display = 'flex';
      updateDateFooter();
    }
  }
  renderTabs();
  renderList();
}

// ── Tab drag & drop ───────────────────────────────────────────────────────────
function onTabDragStart(e, idx) {
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onTabDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.tab-item').forEach((el,i) => {
    el.classList.toggle('drag-over', i === idx && i !== dragSrcIdx);
  });
}
function onTabDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onTabDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  // Respect pinned boundary: can't drag unpinned before pinned
  const src = openTabs[dragSrcIdx];
  const pinnedCount = openTabs.filter(x => x.pinned).length;
  const targetPinned = openTabs[idx] && openTabs[idx].pinned;
  if (!src.pinned && targetPinned) { toast('Ne peut pas déplacer avant un onglet épinglé'); return; }
  if (src.pinned && !openTabs[idx].pinned && idx >= pinnedCount) { src.pinned = false; }
  openTabs.splice(dragSrcIdx, 1);
  openTabs.splice(idx, 0, src);
  dragSrcIdx = null;
  renderTabs();
}
function onTabDragEnd(e) {
  dragSrcIdx = null;
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.remove('dragging','drag-over');
  });
}

// ── Favorites ─────────────────────────────────────────────────────────────────
function toggleFav(e, id) {
  e.stopPropagation();
  const n = S.notes.find(x => x.id === id);
  if (!n) return;
  n.favorite = !n.favorite;
  autoSave();
  renderList();
  toast(n.favorite ? '⭐ Ajouté aux favoris' : 'Retiré des favoris');
}

function toggleFavFilter() {
  favFilter = !favFilter;
  document.getElementById('fav-filter-btn').classList.toggle('active', favFilter);
  renderList();
}

// ── Image paste ───────────────────────────────────────────────────────────────
function onPaste(e) {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const b64 = ev.target.result;
        const n = S.notes.find(x => x.id === curId);
        if (!n) return;
        if (!n.images) n.images = {};
        const imgId = uid();
        n.images[imgId] = b64;
        const tag = '\n[img:' + imgId + ']\n';
        const ta = document.getElementById('note-textarea');
        const pos = ta.selectionStart;
        ta.value = ta.value.slice(0, pos) + tag + ta.value.slice(pos);
        ta.selectionStart = ta.selectionEnd = pos + tag.length;
        onNoteInput();
        toast('Image collée ✓');
      };
      reader.readAsDataURL(file);
      return;
    }
  }
}

function onNoteInput() {
  const n = S.notes.find(x => x.id === curId);
  if (!n) return;
  n.body = document.getElementById('note-textarea').value;
  n.updated = Date.now();
  if (curView !== 'raw') updatePreview();
  updateDateFooter();
  debounceSave();
  // Refresh list item lazily
  clearTimeout(window._listRefreshTimer);
  window._listRefreshTimer = setTimeout(() => { renderList(); renderTabs(); }, 800);
}

// ── Note meta helpers ─────────────────────────────────────────────────────────
function noteTitle(n) {
  const lines = (n.body || '').split('\n');
  const first = lines.find(l => l.trim());
  return first ? first.replace(/^#+\s*/, '').trim() : '';
}

function notePreview(n) {
  const lines = (n.body || '').split('\n').filter(l => l.trim());
  // Skip title line
  const rest = lines.slice(1).find(l => l.trim() && !l.startsWith('#'));
  return rest ? rest.replace(/^[-*]\s*/, '').trim() : '';
}

function noteTags(n) {
  const matches = (n.body || '').match(/#[\w\u00C0-\u024F]+/g) || [];
  return [...new Set(matches.map(t => t.toLowerCase()))];
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'maintenant';
  if (diff < 3600) return Math.floor(diff/60) + ' min';
  if (diff < 86400) return Math.floor(diff/3600) + ' h';
  if (diff < 172800) return 'hier';
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList() {
  const q = searchQ.toLowerCase();
  let notes = S.notes.filter(n => {
    if (favFilter && !n.favorite) return false;
    if (activeTag && !noteTags(n).includes(activeTag)) return false;
    if (!q) return true;
    return (n.body || '').toLowerCase().includes(q);
  });

  // Favorites first, then by updated desc
  notes = notes.sort((a,b) => {
    if (a.favorite && !b.favorite) return -1;
    if (!a.favorite && b.favorite) return 1;
    return b.updated - a.updated;
  });

  // Collect all tags
  const allTags = [...new Set(S.notes.flatMap(noteTags))].sort();
  const tagFilter = document.getElementById('tag-filter');
  tagFilter.innerHTML = allTags.map(t =>
    `<span class="tag-pill${activeTag===t?' active':''}" onclick="filterTag('${t}')">${t}</span>`
  ).join('');

  const list = document.getElementById('note-list');
  if (!notes.length) {
    list.innerHTML = `<div class="note-empty">${q || activeTag || favFilter ? 'Aucun résultat' : 'Aucune note — crée-en une !'}</div>`;
    return;
  }

  const hl = q ? (s => s.replace(new RegExp('('+escRe(q)+')', 'gi'), '<mark class="search-mark">$1</mark>')) : (s => esc(s));

  list.innerHTML = notes.map(n => {
    const title = noteTitle(n) || null;
    const preview = notePreview(n);
    const tags = noteTags(n).slice(0, 3);
    const isActive = n.id === curId;
    const isFav = !!n.favorite;
    return `<div class="note-item${isActive?' active':''}" data-id="${n.id}" onclick="openNote('${n.id}')${window.innerWidth<=680?';showEditor()':''}">
      <div style="display:flex;align-items:flex-start;gap:6px;">
        <div style="flex:1;min-width:0;">
          <div class="note-item-title${!title?' untitled':''}">${title ? hl(title) : 'Sans titre'}</div>
          ${preview ? `<div class="note-item-preview">${hl(preview)}</div>` : ''}
        </div>
        <button class="note-item-fav${isFav?' on':''}" onclick="toggleFav(event,'${n.id}')" title="${isFav?'Retirer des favoris':'Ajouter aux favoris'}">⭐</button>
      </div>
      <div class="note-item-meta">
        <span class="note-item-date">${formatDate(n.updated)}</span>
        <div class="note-item-tags">${tags.map(t=>`<span class="note-tag-badge">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

function filterTag(t) {
  activeTag = activeTag === t ? null : t;
  renderList();
}

function onSearch() {
  searchQ = document.getElementById('search-input').value;
  renderList();
}

// ── View modes ────────────────────────────────────────────────────────────────
function setView(v) {
  curView = v;
  const raw = document.getElementById('editor-raw');
  const preview = document.getElementById('editor-preview');
  const body = document.getElementById('editor-body');
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('vt-' + v).classList.add('active');

  if (v === 'raw') {
    raw.style.display = '';
    preview.style.display = 'none';
    body.classList.remove('editor-split');
  } else if (v === 'split') {
    raw.style.display = '';
    preview.style.display = '';
    body.classList.add('editor-split');
    body.style.flexDirection = 'row';
    updatePreview();
  } else { // preview
    raw.style.display = 'none';
    preview.style.display = '';
    body.classList.remove('editor-split');
    updatePreview();
  }
  updateExportBar();
}

function updateExportBar() {
  const bar = document.getElementById('export-bar');
  const tmpl = TEMPLATES.find(t => t.id === (curTemplate || 'none'));
  bar.style.display = (curView !== 'raw' && tmpl && tmpl.id !== 'none') ? '' : 'none';
}

function updateDateFooter() {
  const footer = document.getElementById('note-date-footer');
  const label  = document.getElementById('note-date-text');
  const n = S.notes.find(x => x.id === curId);
  if (!n) { footer.style.display = 'none'; return; }
  footer.style.display = '';
  const d = new Date(n.updated);
  label.textContent = 'Modifiée le ' + d.toLocaleDateString('fr-FR', {
    weekday:'long', year:'numeric', month:'long', day:'numeric'
  }) + ' à ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

// ── Template menu ─────────────────────────────────────────────────────────────
function buildTmplMenu() {
  const menu = document.getElementById('tmpl-menu');
  menu.innerHTML = TEMPLATES.map((t,i) =>
    `${i > 0 ? '<div class="tmpl-divider"></div>' : ''}
     <div class="tmpl-menu-item" onclick="applyTemplate('${t.id}')">
       <span class="tmpl-menu-item-name">${esc(t.name)}</span>
       <span class="tmpl-menu-item-desc">${esc(t.desc)}</span>
     </div>`
  ).join('');
}

function toggleTmplMenu() {
  const menu = document.getElementById('tmpl-menu');
  const btn  = document.getElementById('tmpl-btn');
  const open = menu.style.display === 'none';
  menu.style.display = open ? '' : 'none';
  btn.classList.toggle('open', open);
  if (open) {
    const close = e => { if (!document.getElementById('tmpl-wrap').contains(e.target)) {
      menu.style.display = 'none'; btn.classList.remove('open');
      document.removeEventListener('click', close);
    }};
    setTimeout(() => document.addEventListener('click', close), 10);
  }
}

function applyTemplate(tmplId) {
  document.getElementById('tmpl-menu').style.display = 'none';
  document.getElementById('tmpl-btn').classList.remove('open');
  const tmpl = TEMPLATES.find(t => t.id === tmplId);
  if (!tmpl) return;
  const n = S.notes.find(x => x.id === curId);
  if (!n) { newNote(tmplId); return; }

  // If has content and switching template, confirm
  if (tmpl.id !== 'none' && n.body.trim() && n.body.trim() !== (TEMPLATES.find(t=>t.id===curTemplate)||{}).placeholder) {
    if (!confirm('Appliquer le template "' + tmpl.name + '" ? Le contenu actuel est conservé.')) return;
  }

  if (tmpl.id !== 'none' && !n.body.trim()) {
    // Empty note → load placeholder
    n.body = tmpl.placeholder || '';
    document.getElementById('note-textarea').value = n.body;
  }

  n.template = tmplId;
  curTemplate = tmplId;
  n.updated = Date.now();
  autoSave();
  updatePreview();
  updateExportBar();
  if (curView === 'raw') setView('split');
  toast('Template : ' + tmpl.name);
}

// ── Preview rendering ─────────────────────────────────────────────────────────
function updatePreview() {
  const preview = document.getElementById('editor-preview');
  if (preview.style.display === 'none') return;
  const n = S.notes.find(x => x.id === curId);
  if (!n) { preview.innerHTML = '<div class="pr-empty">Aucune note</div>'; return; }
  const tmpl = TEMPLATES.find(t => t.id === (curTemplate || n.template || 'none'));
  preview.innerHTML = tmpl && tmpl.render ? tmpl.render(n.body) : renderFree(n.body);
}

// ── Renderers ─────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── Rich text helpers ─────────────────────────────────────────────────────────
function ytVideoId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function renderRichLine(line) {
  // Escape first
  let s = esc(line);
  // Links → clickable (after escape so we work with HTML entities)
  // We re-detect on original line
  return line.replace(/(https?:\/\/[^\s]+)/g, url => {
    const vid = ytVideoId(url);
    if (vid) return `__YT:${vid}__`;
    return `<a class="pr-link" href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a>`;
  }).replace(/&/g,'&amp;').replace(/<(?!a |\/a>)/g,'&lt;');
  // Note: this approach has limitations — using a cleaner method below
}

function renderRichBody(body) {
  // Get current note for image lookup
  const _n = S.notes.find(x => x.id === curId);
  const _imgs = (_n && _n.images) ? _n.images : {};
  // Process line by line
  const lines = body.split('\n');
  const out = [];
  for (const line of lines) {
    // Image tag [img:shortId] — resolve from note.images
    const imgMatch = line.match(/^\[img:([a-z0-9]+)\]$/);
    if (imgMatch) {
      const src = _imgs[imgMatch[1]];
      if (src) out.push(`<img class="pr-img" src="${src}" alt="image collée">`);
      continue;
    }
    // Detect YouTube URL on this line
    const ytMatch = line.match(/https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if (ytMatch) {
      const vid = ytMatch[1];
      out.push(`<div class="pr-yt-wrap"><iframe src="https://www.youtube-nocookie.com/embed/${vid}" allowfullscreen loading="lazy"></iframe></div>`);
      continue;
    }
    // Regular line with clickable links
    const escaped = line
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/(https?:\/\/[^\s<>"]+)/g, url =>
        `<a class="pr-link" href="${url}" target="_blank" rel="noopener">${url}</a>`
      );
    out.push(escaped);
  }
  return out.join('\n');
}

function renderFree(body) {
  if (!body || !body.trim()) return '<div class="pr-empty">Note vide</div>';
  const lines = body.split('\n');
  const title = lines[0].replace(/^#+\s*/,'').trim();
  const rest  = lines.slice(1).join('\n').trim();
  const tags  = (body.match(/#[\w\u00C0-\u024F]+/g) || []).map(t => `<span class="pr-tag">${esc(t)}</span>`).join('');
  return `
    ${title ? `<div class="pr-title">${esc(title)}</div>` : ''}
    ${tags ? `<div style="margin-bottom:14px;">${tags}</div>` : ''}
    <div class="pr-note-body">${renderRichBody(rest)}</div>
  `;
}

// CR parser/renderer
function parseCR(body) {
  const lines = body.split('\n');
  const title = lines[0].replace(/^#+\s*/,'').trim();
  const meta = {};
  const decisions = [];
  const actions = [];
  let nextDate = '', nextOdj = '';
  let section = null;

  lines.slice(1).forEach(line => {
    const l = line.trim();
    if (!l) return;
    // Section headers
    if (/^##\s*décisions?/i.test(l)) { section = 'decisions'; return; }
    if (/^##\s*actions?/i.test(l)) { section = 'actions'; return; }
    if (/^##\s*prochaine/i.test(l)) { section = 'next'; return; }
    if (l.startsWith('#')) { section = null; return; }

    // Meta fields (key: value)
    const metaMatch = l.match(/^(date|participants?|durée?|duree|objectif)\s*:\s*(.+)/i);
    if (metaMatch && !section) { meta[metaMatch[1].toLowerCase().replace('é','e')] = metaMatch[2].trim(); return; }

    if (section === 'decisions' && l.startsWith('-')) {
      const text = l.replace(/^-\s*/,'').trim();
      if (text) decisions.push(text);
    }
    if (section === 'actions') {
      const m = l.match(/^-\s*\[[ x]\]\s*(.+)/i);
      if (m) {
        const rest = m[1];
        const assignee = (rest.match(/@(\S+)/) || [])[1] || '';
        const due = (rest.match(/(\d{4}-\d{2}-\d{2})/) || [])[1] || '';
        const done = /\[x\]/i.test(l);
        const text = rest.replace(/@\S+/,'').replace(/\d{4}-\d{2}-\d{2}/,'').trim();
        actions.push({text, assignee, due, done});
      }
    }
    if (section === 'next') {
      const dm = l.match(/^date\s*:\s*(.+)/i);
      const om = l.match(/^(ordre du jour|odj)\s*:\s*(.+)/i);
      if (dm) nextDate = dm[1].trim();
      if (om) nextOdj  = om[2].trim();
    }
  });

  return {title, meta, decisions, actions, nextDate, nextOdj};
}

function renderCR(body) {
  const cr = parseCR(body);
  if (!cr.title && !cr.decisions.length && !cr.actions.length) return renderFree(body);
  let h = '';
  if (cr.title) h += `<div class="pr-title">${esc(cr.title)}</div>`;

  const metaMap = {date:'Date',participants:'Participants',duree:'Durée',objectif:'Objectif'};
  Object.entries(metaMap).forEach(([k,label]) => {
    if (cr.meta[k]) h += `<div class="pr-meta-row"><span class="pr-meta-label">${label}</span><span class="pr-meta-val">${esc(cr.meta[k])}</span></div>`;
  });

  if (cr.decisions.length) {
    h += `<div class="pr-section"><div class="pr-section-label">Décisions (${cr.decisions.length})</div>`;
    h += cr.decisions.map((d,i) => `<div class="pr-item"><span class="pr-item-icon">▶</span><div class="pr-item-body">${esc(d)}</div></div>`).join('');
    h += '</div>';
  }
  if (cr.actions.length) {
    h += `<div class="pr-section"><div class="pr-section-label">Actions (${cr.actions.length})</div>`;
    h += cr.actions.map(a => {
      const done = a.done;
      return `<div class="pr-item">
        <span class="pr-item-icon">${done ? '✅' : '☐'}</span>
        <div class="pr-item-body">
          ${esc(a.text)}
          ${a.assignee ? `<span style="color:var(--blue);font-weight:600;margin-left:6px;">@${esc(a.assignee)}</span>` : ''}
          ${a.due ? `<span style="color:var(--amber);margin-left:6px;">📅 ${esc(a.due)}</span>` : ''}
          ${done ? `<span class="pr-item-badge done">Fait</span>` : `<span class="pr-item-badge action">Action</span>`}
        </div>
      </div>`;
    }).join('');
    h += '</div>';
  }
  if (cr.nextDate || cr.nextOdj) {
    h += `<div class="pr-section"><div class="pr-section-label">Prochaine réunion</div>
      <div style="padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;background:var(--bg);">
        ${cr.nextDate ? `📅 <strong>${esc(cr.nextDate)}</strong>` : ''}
        ${cr.nextOdj  ? `<span style="color:var(--muted);margin-left:8px;">— ${esc(cr.nextOdj)}</span>` : ''}
      </div></div>`;
  }
  return h;
}

// Standup parser/renderer
function parseStandup(body) {
  const lines = body.split('\n');
  const title = lines[0].replace(/^#+\s*/,'').trim();
  const hier = [], auj = [], bloc = [];
  let section = null;

  lines.slice(1).forEach(line => {
    const l = line.trim();
    if (!l) return;
    if (/^hier\s*:/i.test(l)) { section = 'hier'; const val = l.replace(/^hier\s*:\s*/i,'').trim(); if(val) hier.push(val); return; }
    if (/^aujourd.hui\s*:/i.test(l)) { section = 'auj'; const val = l.replace(/^aujourd.hui\s*:\s*/i,'').trim(); if(val) auj.push(val); return; }
    if (/^blocages?\s*:/i.test(l)) { section = 'bloc'; const val = l.replace(/^blocages?\s*:\s*/i,'').trim(); if(val) bloc.push(val); return; }
    if (l.startsWith('-') || l.startsWith('•')) {
      const text = l.replace(/^[-•]\s*/,'').trim();
      if (!text) return;
      if (section === 'hier') hier.push(text);
      else if (section === 'auj') auj.push(text);
      else if (section === 'bloc') bloc.push(text);
    } else if (section && !l.startsWith('#')) {
      if (section === 'hier') hier.push(l);
      else if (section === 'auj') auj.push(l);
      else if (section === 'bloc') bloc.push(l);
    }
  });
  return {title, hier, auj, bloc};
}

function renderStandup(body) {
  const s = parseStandup(body);
  let h = '';
  if (s.title) h += `<div class="pr-title">${esc(s.title)}</div>`;

  const renderBlock = (items, cls, icon, label) => {
    if (!items.length) return '';
    return `<div class="standup-block">
      <div class="standup-label">${icon} ${label}</div>
      <div class="standup-content ${cls}">${items.map(i => '• ' + esc(i)).join('\n')}</div>
    </div>`;
  };
  h += renderBlock(s.hier, 'hier', '✅', 'Hier');
  h += renderBlock(s.auj, 'auj', '🎯', "Aujourd'hui");
  h += renderBlock(s.bloc, 'bloc', '🔴', 'Blocages');
  if (!s.hier.length && !s.auj.length && !s.bloc.length) return renderFree(body);
  return h;
}

// Réflexion parser/renderer
function parseReflexion(body) {
  const lines = body.split('\n');
  const title = lines[0].replace(/^#+\s*/,'').trim();
  let contexte = '', probleme = '', decision = '', action = '';
  const options = [];
  let section = null;
  let multilineBuffer = '';
  let multilineKey = null;

  const flush = () => {
    if (!multilineKey || !multilineBuffer.trim()) return;
    if (multilineKey === 'contexte') contexte = multilineBuffer.trim();
    if (multilineKey === 'probleme') probleme = multilineBuffer.trim();
    if (multilineKey === 'decision') decision = multilineBuffer.trim();
    if (multilineKey === 'action') action = multilineBuffer.trim();
    multilineBuffer = ''; multilineKey = null;
  };

  lines.slice(1).forEach(line => {
    const l = line.trim();
    if (!l) { multilineBuffer += '\n'; return; }
    if (/^contexte\s*:/i.test(l)) { flush(); section = null; multilineKey = 'contexte'; multilineBuffer = l.replace(/^contexte\s*:\s*/i,''); return; }
    if (/^probl[eè]me\s*:/i.test(l)) { flush(); section = null; multilineKey = 'probleme'; multilineBuffer = l.replace(/^probl[eè]me\s*:\s*/i,''); return; }
    if (/^options?\s*:/i.test(l) || /^options?\s*$/i.test(l)) { flush(); section = 'options'; return; }
    if (/^décision\s*:/i.test(l)) { flush(); section = null; multilineKey = 'decision'; multilineBuffer = l.replace(/^décision\s*:\s*/i,''); return; }
    if (/^prochaine action\s*:/i.test(l)) { flush(); section = null; multilineKey = 'action'; multilineBuffer = l.replace(/^prochaine action\s*:\s*/i,''); return; }

    if (section === 'options') {
      const m = l.match(/^(\d+)\.\s*(.+)/);
      if (m) { options.push(m[2].trim()); return; }
    }
    if (multilineKey) { multilineBuffer += ' ' + l; return; }
  });
  flush();
  return {title, contexte, probleme, options, decision, action};
}

function renderReflexion(body) {
  const r = parseReflexion(body);
  let h = '';
  if (r.title) h += `<div class="pr-title">${esc(r.title)}</div>`;

  if (r.contexte) h += `<div class="reflexion-section"><div class="reflexion-label">🗺 Contexte</div><div class="reflexion-content">${esc(r.contexte)}</div></div>`;
  if (r.probleme) h += `<div class="reflexion-section"><div class="reflexion-label">⚡ Problème</div><div class="reflexion-content">${esc(r.probleme)}</div></div>`;
  if (r.options.length) {
    h += `<div class="reflexion-section"><div class="reflexion-label">🔀 Options</div><div class="reflexion-options">`;
    h += r.options.map((o,i) => `<div class="reflexion-option"><span class="reflexion-option-num">${i+1}.</span>${esc(o)}</div>`).join('');
    h += '</div></div>';
  }
  if (r.decision) {
    h += `<div class="decision-box"><div class="decision-box-label">✓ Décision retenue</div>${esc(r.decision)}</div>`;
  }
  if (r.action) h += `<div class="reflexion-section" style="margin-top:16px;"><div class="reflexion-label">▶ Prochaine action</div><div class="reflexion-content">${esc(r.action)}</div></div>`;

  if (!r.contexte && !r.probleme && !r.options.length && !r.decision) return renderFree(body);
  return h;
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportMd() {
  const n = S.notes.find(x => x.id === curId);
  if (!n) return;
  const title = noteTitle(n) || 'note';
  const blob = new Blob([n.body], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug(title) + '.md';
  a.click();
}

function exportTxt() {
  const n = S.notes.find(x => x.id === curId);
  if (!n) return;
  const title = noteTitle(n) || 'note';
  const blob = new Blob([n.body], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug(title) + '.txt';
  a.click();
}

function copyHtml() {
  const preview = document.getElementById('editor-preview');
  const text = preview.innerText || '';
  navigator.clipboard.writeText(text).then(() => toast('Copié !'));
}

function slug(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'note';
}

// ── Mobile ────────────────────────────────────────────────────────────────────
function showEditor() {
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('editor-pane').classList.remove('hidden');
  document.getElementById('mobile-back-btn').style.display = 'flex';
}

function mobileBack() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('editor-pane').classList.add('hidden');
  document.getElementById('mobile-back-btn').style.display = 'none';
}

// ── Persist ───────────────────────────────────────────────────────────────────
function debounceSave() {
  setSyncDot('pending');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 1500);
}

function autoSave() {
  localStorage.setItem(SK, JSON.stringify(S));
  if (accessToken) pushToDrive();
  else setSyncDot('local');
}

function setSyncDot(state) {
  const el = document.getElementById('sync-dot');
  const map = {local:'⚫ Local', pending:'🟡 Pending', sync:'🟢 Sync ✓', error:'🔴 Erreur'};
  el.textContent = map[state] || '⚫ Local';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Google Drive ──────────────────────────────────────────────────────────────
const DRIVE_FILE = 'notes2.json';

function handleDriveBtn() {
  if (accessToken) {
    pullFromDrive();
  } else {
    initDriveAuth();
  }
}

function initDriveAuth() {
  if (!window.google) { toast('Google Auth pas encore chargé'); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: (resp) => {
      if (resp.error) { toast('Auth erreur: ' + resp.error); return; }
      accessToken = resp.access_token;
      sessionStorage.setItem(TOK, accessToken);
      document.getElementById('drive-bar').style.display = '';
      pullFromDrive();
      scheduleAutoRefresh();
    }
  });
  tokenClient.requestAccessToken({prompt:'consent'});
}

function scheduleAutoRefresh() {
  clearInterval(pollTimer);
  pollTimer = setInterval(pullFromDrive, 60000);
}

async function findDriveFile() {
  const r = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE}'+and+trashed=false&fields=files(id,name)`,
    {headers:{Authorization:'Bearer '+accessToken}}
  );
  const d = await r.json();
  return (d.files && d.files[0]) ? d.files[0].id : null;
}

async function pullFromDrive() {
  if (!accessToken) return;
  try {
    setSyncDot('pending');
    driveFileId = driveFileId || await findDriveFile();
    if (!driveFileId) { setSyncDot('local'); return; }
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
      {headers:{Authorization:'Bearer '+accessToken}}
    );
    const d = await r.json();
    if (d.notes) {
      S = d; ensureState();
      localStorage.setItem(SK, JSON.stringify(S));
      renderList();
      if (curId) { const n = S.notes.find(x => x.id === curId); if(n) openNote(n.id); }
    }
    setSyncDot('sync');
    document.getElementById('drive-status-text').textContent = 'Synced ' + new Date().toLocaleTimeString('fr-FR');
  } catch(e) {
    setSyncDot('error');
  }
}

async function pushToDrive() {
  if (!accessToken) return;
  try {
    setSyncDot('pending');
    driveFileId = driveFileId || await findDriveFile();
    const body = JSON.stringify(S);
    const meta = {name: DRIVE_FILE, mimeType:'application/json'};
    let r;
    if (driveFileId) {
      r = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`,
        {method:'PATCH', headers:{Authorization:'Bearer '+accessToken,'Content-Type':'multipart/related; boundary=bound'},
         body: '--bound\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(meta)+'\r\n--bound\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--bound--'}
      );
    } else {
      r = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`,
        {method:'POST', headers:{Authorization:'Bearer '+accessToken,'Content-Type':'multipart/related; boundary=bound'},
         body: '--bound\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(meta)+'\r\n--bound\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--bound--'}
      );
      const d = await r.json();
      driveFileId = d.id;
    }
    setSyncDot('sync');
  } catch(e) {
    setSyncDot('error');
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
init();
